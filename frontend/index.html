<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockNexus - Cadastro de Produtos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>

    <div class="logo">

      <div class="logo-icon">
        S
      </div>

      <div class="logo-text">
        StockNexus
      </div>

    </div>

    <div class="nav-links">
      <a href="#">Dashboard</a>
      <a href="#cadastro">Cadastrar</a>
      <a href="#lista">Estoque</a>
    </div>

  </nav> 
  <br>
   <section id="dashboard">

  <div class="card-dashboard">

    <span>Total Produtos</span>

    <h3 id="total-produtos">0</h3>

  </div>

  <div class="card-dashboard">

    <span>Valor em Estoque</span>

    <h3 id="valor-estoque">R$ 0</h3>

  </div>

  <div class="card-dashboard alerta">

    <span>Estoque Baixo</span>

    <h3 id="estoque-baixo">0</h3>

  </div>

</section>
  <main>
    <section id="cadastro">
      <h2>Cadastrar Novo Produto</h2>
      <form id="form-produto">
        <label for="codigo_barras">Código de Barras:</label>
        <input type="text" id="codigo_barras" name="codigo_barras" required>

        <label for="nome">Nome do Produto:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao"></textarea>

        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" min="1" required>

        <label for="preco">Preço (R$):</label>
        <input type="number" id="preco" name="preco" step="0.01" min="0" required>
        <div id="mensagem" class="mensagem"></div>
        <button type="submit" id="btn-cadastrar">Cadastrar Produto</button>
        <button type="reset" id="btn-limpar">Limpar Formulário</button>
      </form>
    </section>

   <section id="lista">
  <h2>Produtos Cadastrados</h2>

  <input
  type="text"
  id="pesquisa"
  oninput="pesquisarProdutos()"
  placeholder="Pesquisar produto..."
>

  <ul id="lista-produtos"></ul>
</section>
  </main>

  <!-- MODAL DELETE -->

<div id="modal-delete" class="modal">

  <div class="modal-content">

    <h3>Remover Produto</h3>

    <p>
      Tem certeza que deseja deletar este produto?
    </p>

    <div class="modal-buttons">

      <button
      class="btn-cancelar"
      onclick="fecharModal()">

        Cancelar

      </button>

      <button
      class="btn-confirmar"
      id="btn-confirmar-delete">

        Deletar

      </button>

    </div>

  </div>

</div>

  <script src="script.js"></script>
</body>
</html>
